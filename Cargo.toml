[workspace]
members = [
    "volumecontrol-core",
    "volumecontrol-linux",
    "volumecontrol-windows",
    "volumecontrol-macos",
    "volumecontrol",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"
repository = "https://github.com/SomaticIT/volumecontrol"

[workspace.dependencies]
volumecontrol-core = { path = "volumecontrol-core" }
thiserror = "2.0"
