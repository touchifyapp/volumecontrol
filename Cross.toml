# ── cross cross-compilation configuration ────────────────────────────────────
#
# Cross.toml is the highest-priority configuration file read by cross
# (https://github.com/cross-rs/cross).  It is read regardless of how cross
# is invoked (from the workspace root, from a sub-crate, or via napi CLI).
#
# Each target section tells cross to install the PulseAudio and ALSA
# development libraries before building.  libasound2-dev is a transitive
# build requirement of libpulse-dev on Debian/Ubuntu.
#
# A <rust-target-triple>-pkg-config wrapper is also created for every target.
# The pkg-config Rust crate looks for this wrapper when cross-compiling;
# without it the crate falls back to the host's pkg-config and never emits
# cargo:rustc-link-search, causing the linker to fail when producing shared
# objects (e.g. the napi cdylib).
#
# GNU targets: libpulse-dev is installed for the target architecture via dpkg
# multi-arch; the wrapper points at the target-arch pkgconfig directory.
#
# musl targets: PulseAudio's shared library is glibc-linked and cannot be
# dynamically linked into musl binaries, so we only cross check those targets.
# However, cargo check still runs build scripts, so we install the glibc
# libpulse-dev (same arch) to satisfy libpulse-sys's build script.
#
# See https://github.com/cross-rs/cross/blob/main/docs/custom_images.md

# ── GNU targets ──────────────────────────────────────────────────────────────

[target.aarch64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update && apt-get --assume-yes install libpulse-dev:$CROSS_DEB_ARCH libasound2-dev:$CROSS_DEB_ARCH",
    "echo '#!/bin/sh' > /usr/local/bin/aarch64-unknown-linux-gnu-pkg-config",
    "echo 'PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig PKG_CONFIG_ALLOW_CROSS=1 exec pkg-config \"$@\"' >> /usr/local/bin/aarch64-unknown-linux-gnu-pkg-config",
    "chmod +x /usr/local/bin/aarch64-unknown-linux-gnu-pkg-config",
]

[target.aarch64-unknown-linux-gnu.env]
passthrough = ["RUSTFLAGS"]

[target.armv7-unknown-linux-gnueabihf]
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update && apt-get --assume-yes install libpulse-dev:$CROSS_DEB_ARCH libasound2-dev:$CROSS_DEB_ARCH",
    "echo '#!/bin/sh' > /usr/local/bin/armv7-unknown-linux-gnueabihf-pkg-config",
    "echo 'PKG_CONFIG_LIBDIR=/usr/lib/arm-linux-gnueabihf/pkgconfig PKG_CONFIG_ALLOW_CROSS=1 exec pkg-config \"$@\"' >> /usr/local/bin/armv7-unknown-linux-gnueabihf-pkg-config",
    "chmod +x /usr/local/bin/armv7-unknown-linux-gnueabihf-pkg-config",
]

[target.armv7-unknown-linux-gnueabihf.env]
passthrough = ["RUSTFLAGS"]

# ── musl targets ─────────────────────────────────────────────────────────────

[target.x86_64-unknown-linux-musl]
pre-build = [
    "apt-get update && apt-get --assume-yes install libpulse-dev libasound2-dev",
    "echo '#!/bin/sh' > /usr/local/bin/x86_64-unknown-linux-musl-pkg-config",
    "echo 'PKG_CONFIG_LIBDIR=/usr/lib/x86_64-linux-gnu/pkgconfig PKG_CONFIG_ALLOW_CROSS=1 exec pkg-config \"$@\"' >> /usr/local/bin/x86_64-unknown-linux-musl-pkg-config",
    "chmod +x /usr/local/bin/x86_64-unknown-linux-musl-pkg-config",
]

[target.aarch64-unknown-linux-musl]
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update && apt-get --assume-yes install libpulse-dev:$CROSS_DEB_ARCH libasound2-dev:$CROSS_DEB_ARCH",
    "echo '#!/bin/sh' > /usr/local/bin/aarch64-unknown-linux-musl-pkg-config",
    "echo 'PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig PKG_CONFIG_ALLOW_CROSS=1 exec pkg-config \"$@\"' >> /usr/local/bin/aarch64-unknown-linux-musl-pkg-config",
    "chmod +x /usr/local/bin/aarch64-unknown-linux-musl-pkg-config",
]

[target.armv7-unknown-linux-musleabihf]
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update && apt-get --assume-yes install libpulse-dev:$CROSS_DEB_ARCH libasound2-dev:$CROSS_DEB_ARCH",
    "echo '#!/bin/sh' > /usr/local/bin/armv7-unknown-linux-musleabihf-pkg-config",
    "echo 'PKG_CONFIG_LIBDIR=/usr/lib/arm-linux-gnueabihf/pkgconfig PKG_CONFIG_ALLOW_CROSS=1 exec pkg-config \"$@\"' >> /usr/local/bin/armv7-unknown-linux-musleabihf-pkg-config",
    "chmod +x /usr/local/bin/armv7-unknown-linux-musleabihf-pkg-config",
]
