# Runs on every push to main.
# - release-plz-release: publishes unpublished crates to crates.io and creates
#   GitHub releases + tags.
# - release-plz-pr: opens or updates a release PR with version bumps and
#   changelogs for every crate that changed since the last release.
#
# Because branch protection requires ALL CI workflows to pass before anything
# can merge to main, we know CI is green when this runs. No polling needed.
#
# Both jobs are skipped on forks (no secrets available there).

name: Release-plz

on:
  push:
    branches:
      - main

jobs:

  # Release unpublished packages.
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'touchifyapp' }}
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.PR_APP_ID }}
          private-key: ${{ secrets.PR_PRIVATE_KEY }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Create a PR with the new versions and changelog, preparing the next release.
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'touchifyapp' }}
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.PR_APP_ID }}
          private-key: ${{ secrets.PR_PRIVATE_KEY }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libpulse-dev libasound2-dev
      - name: Run release-plz
        id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Update version in volumecontrol-napi package.json
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          PR: ${{ steps.release-plz.outputs.pr }}
        run: |
          set -e

          PR_NUMBER=$(printf '%s' "${PR:-}" | jq -r 'if type == "object" then (.number // "") else "" end' 2>/dev/null || true)

          if [[ -n "$PR_NUMBER" ]]; then
            VERSION=$(printf '%s' "${PR:-}" | jq -r 'if type == "object" then ((.releases // [])[] | select(.package_name == "volumecontrol-napi") | .version) else empty end' 2>/dev/null || true)

            if [[ -z "$VERSION" ]]; then
              echo "No release found for volumecontrol-napi in the PR. Skipping."
              exit 0
            fi

            gh pr checkout $PR_NUMBER
            cat volumecontrol-napi/package.json | jq '.version = "'$VERSION'"' | tee volumecontrol-napi/package.json
            git add .
            git commit --amend --no-edit
            git push --force-with-lease
          fi
