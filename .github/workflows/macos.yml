name: macOS CoreAudio CI

on:
  push:
    branches: ["main"]
    paths:
      - "volumecontrol-macos/**"
      - "volumecontrol-core/**"
      - "volumecontrol/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/macos.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "volumecontrol-macos/**"
      - "volumecontrol-core/**"
      - "volumecontrol/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/macos.yml"

jobs:
  # ── per-architecture matrix ─────────────────────────────────────────────────

  check:
    name: Check (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-15-intel
          - target: aarch64-apple-darwin
            runner: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ── volumecontrol-macos ──────────────────────────────────────────────────

      - name: cargo check volumecontrol-macos (no features)
        run: cargo check -p volumecontrol-macos --target ${{ matrix.target }}

      - name: cargo check volumecontrol-macos (coreaudio feature)
        run: cargo check -p volumecontrol-macos --features coreaudio --target ${{ matrix.target }}

      - name: cargo test volumecontrol-macos (no features)
        run: cargo test -p volumecontrol-macos --target ${{ matrix.target }}

      - name: cargo test volumecontrol-macos (coreaudio feature)
        run: cargo test -p volumecontrol-macos --features coreaudio --target ${{ matrix.target }}

      - name: cargo clippy volumecontrol-macos (coreaudio feature)
        run: >
          cargo clippy -p volumecontrol-macos
          --features coreaudio
          --target ${{ matrix.target }}
          --all-targets
          -- -D warnings

      # ── volumecontrol wrapper ────────────────────────────────────────────────

      - name: cargo check volumecontrol (no features)
        run: cargo check -p volumecontrol --target ${{ matrix.target }}

      - name: cargo check volumecontrol (coreaudio feature)
        run: cargo check -p volumecontrol --features coreaudio --target ${{ matrix.target }}

      - name: cargo test volumecontrol (no features)
        run: cargo test -p volumecontrol --target ${{ matrix.target }}

      - name: cargo test volumecontrol (coreaudio feature)
        run: cargo test -p volumecontrol --features coreaudio --target ${{ matrix.target }}

      - name: cargo clippy volumecontrol (coreaudio feature)
        run: >
          cargo clippy -p volumecontrol
          --features coreaudio
          --target ${{ matrix.target }}
          --all-targets
          -- -D warnings

  # ── universal binary job ────────────────────────────────────────────────────

  check-universal:
    name: Universal binary (x86_64 + aarch64)
    runs-on: macos-latest # Apple Silicon; can cross-compile to x86_64
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable with both Apple targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Build x86_64 slice (coreaudio feature)
        run: >
          cargo build -p volumecontrol-macos
          --features coreaudio
          --target x86_64-apple-darwin
          --release

      - name: Build aarch64 slice (coreaudio feature)
        run: >
          cargo build -p volumecontrol-macos
          --features coreaudio
          --target aarch64-apple-darwin
          --release

      - name: Combine into universal library with lipo
        run: |
          lipo -create \
            target/x86_64-apple-darwin/release/libvolumecontrol_macos.rlib \
            target/aarch64-apple-darwin/release/libvolumecontrol_macos.rlib \
            -output target/libvolumecontrol_macos_universal.rlib

      - name: Verify universal binary architectures
        run: lipo -info target/libvolumecontrol_macos_universal.rlib
