# Triggered when release-plz creates a volumecontrol-napi-vX.Y.Z tag,
# or manually to build and inspect artifacts without publishing.
#
# Builds native .node binaries for every napi target, then publishes
# @touchifyapp/volumecontrol (and its per-platform packages) to npm.

name: Release napi

on:
  push:
    tags:
      - 'volumecontrol-napi-v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Whether to publish to npm (true/false). Only applicable if the release already exists on GitHub.'
        type: boolean
        required: false
        default: false

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  # ── Build .node binaries for every target ────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — both x64 and arm64 build on the same runner
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: aarch64-apple-darwin
            runner: macos-latest

          # Windows — all three ABIs build natively on windows-latest
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
          - target: i686-pc-windows-msvc
            runner: windows-latest
          - target: aarch64-pc-windows-msvc
            runner: windows-latest

          # Linux x64 — native build; needs PulseAudio dev libs
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            linux_native: true

          # Linux cross targets — use `cross` which reads Cross.toml
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: true
          - target: armv7-unknown-linux-gnueabihf
            runner: ubuntu-latest
            use_cross: true

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: volumecontrol-napi/package-lock.json

      - name: Install Rust (${{ matrix.target }})
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: ${{ matrix.target }}

      - name: Install PulseAudio dev libs (Linux native)
        if: ${{ matrix.linux_native }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libpulse-dev libasound2-dev

      - name: Install cross (Linux cross-compilation)
        if: ${{ matrix.use_cross }}
        run: cargo install cross --locked

      - name: npm install
        working-directory: volumecontrol-napi
        run: npm install

      - name: Build (using cross)
        if: ${{ matrix.use_cross }}
        working-directory: volumecontrol-napi
        run: npx napi build --platform --release --target ${{ matrix.target }} --use-cross

      - name: Build
        if: ${{ !matrix.use_cross }}
        working-directory: volumecontrol-napi
        run: npx napi build --platform --release --target ${{ matrix.target }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v6
        with:
          name: bindings-${{ matrix.target }}
          path: volumecontrol-napi/*.node
          if-no-files-found: error

  # ── Publish to npm ────────────────────────────────────────────────────────
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: volumecontrol-napi/package-lock.json

      - name: npm install
        working-directory: volumecontrol-napi
        run: npm install

      - name: Create npm platform directories
        working-directory: volumecontrol-napi
        run: npx napi create-npm-dirs

      - name: Download all binary artifacts
        uses: actions/download-artifact@v8
        with:
          path: volumecontrol-napi/artifacts

      - name: Move .node files into package directory
        working-directory: volumecontrol-napi
        run: npx napi artifacts

      - name: List packages
        working-directory: volumecontrol-napi
        run: ls -R ./npm

      - name: Find GitHub release
        id: gh_release
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish)
        working-directory: volumecontrol-napi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(cat package.json | jq -r .version)
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases/tags/volumecontrol-napi-v$VERSION --jq '.id')
          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "::error::Could not find GitHub release for tag ${{ github.ref_name }}"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "gh_release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"

      - name: Publish packages
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish)
        working-directory: volumecontrol-napi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          RELEASE_ID: ${{ steps.gh_release.outputs.gh_release_id }}
          VERSION: ${{ steps.gh_release.outputs.version }}
        run: |
          npm config set provenance true
          npm set "//registry.npmjs.org/:_authToken" $NPM_TOKEN

          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            npm publish --access public
          elif [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            npm publish --tag next --access public
          else
            echo "Not a release, skipping publish"
          fi
