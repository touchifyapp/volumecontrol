name: macOS CoreAudio CI

on:
  push:
    branches: ["main"]
    paths:
      - "volumecontrol-macos/**"
      - "volumecontrol-core/**"
      - "volumecontrol/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci-macos.yml"
  pull_request:
    paths:
      - "volumecontrol-macos/**"
      - "volumecontrol-core/**"
      - "volumecontrol/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci-macos.yml"

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  # ── per-architecture matrix ─────────────────────────────────────────────────

  check:
    name: Check (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-15-intel
          - target: aarch64-apple-darwin
            runner: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-${{ matrix.target }}-

      # ── volumecontrol-macos ──────────────────────────────────────────────────

      - name: cargo check volumecontrol-macos (no features)
        run: cargo check -p volumecontrol-macos --target ${{ matrix.target }}

      - name: cargo check volumecontrol-macos (coreaudio feature)
        run: cargo check -p volumecontrol-macos --features coreaudio --target ${{ matrix.target }}

      - name: cargo test volumecontrol-macos (no features)
        run: cargo test -p volumecontrol-macos --target ${{ matrix.target }}

      - name: cargo test volumecontrol-macos (coreaudio feature)
        run: cargo test -p volumecontrol-macos --features coreaudio --target ${{ matrix.target }}

      - name: cargo clippy volumecontrol-macos (coreaudio feature)
        run: >
          cargo clippy -p volumecontrol-macos
          --features coreaudio
          --target ${{ matrix.target }}
          --all-targets
          -- -D warnings

      # ── volumecontrol wrapper ────────────────────────────────────────────────
      # The wrapper has no user-visible features; the platform backend is
      # selected and enabled automatically.

      - name: cargo check volumecontrol
        run: cargo check -p volumecontrol --target ${{ matrix.target }}

      - name: cargo test volumecontrol
        run: cargo test -p volumecontrol --target ${{ matrix.target }}

      - name: cargo clippy volumecontrol
        run: >
          cargo clippy -p volumecontrol
          --target ${{ matrix.target }}
          --all-targets
          -- -D warnings

      - name: Build release slice (coreaudio feature)
        run: >
          cargo build -p volumecontrol-macos
          --features coreaudio
          --target ${{ matrix.target }}
          --release

      - name: Upload release rlib
        uses: actions/upload-artifact@v4
        with:
          name: rlib-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/libvolumecontrol_macos.rlib
          retention-days: 1

  # ── universal binary job ────────────────────────────────────────────────────

  check-universal:
    name: Universal binary (x86_64 + aarch64)
    runs-on: macos-latest # Apple Silicon; lipo is available on all macOS runners
    needs: check
    permissions: {}
    steps:
      - name: Download x86_64 slice
        uses: actions/download-artifact@v4
        with:
          name: rlib-x86_64-apple-darwin
          path: target/x86_64-apple-darwin/release/

      - name: Download aarch64 slice
        uses: actions/download-artifact@v4
        with:
          name: rlib-aarch64-apple-darwin
          path: target/aarch64-apple-darwin/release/

      - name: Combine into universal library with lipo
        run: |
          lipo -create \
            target/x86_64-apple-darwin/release/libvolumecontrol_macos.rlib \
            target/aarch64-apple-darwin/release/libvolumecontrol_macos.rlib \
            -output target/libvolumecontrol_macos_universal.rlib

      - name: Verify universal binary architectures
        run: lipo -info target/libvolumecontrol_macos_universal.rlib

  # ── Documentation (macOS / CoreAudio) ────────────────────────────────────────
  doc:
    name: cargo doc (macOS)
    runs-on: macos-latest
    permissions:
      contents: read
    env:
      RUSTDOCFLAGS: "-D warnings"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-doc-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-doc-

      - name: cargo doc
        run: >
          cargo doc
          -p volumecontrol-core
          -p volumecontrol-macos
          -p volumecontrol
          --features volumecontrol-macos/coreaudio
          --no-deps
