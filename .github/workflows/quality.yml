# Quality workflow: formatting and security audit.
#
# Runs on every change to any crate or Cargo manifest so that quality
# checks are enforced regardless of which platform crate is modified.
#
# Jobs
# ────
# fmt    – cargo fmt --all -- --check
# audit  – cargo audit (fails on any known vulnerability)
#
# Note: cargo doc is run per-platform in the platform-specific CI workflows
# so that the correct native libraries and toolchain are available for each
# platform's feature flags.

name: Quality (fmt + audit)

on:
  push:
    paths:
      - "volumecontrol/**"
      - "volumecontrol-core/**"
      - "volumecontrol-linux/**"
      - "volumecontrol-windows/**"
      - "volumecontrol-macos/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/quality.yml"
  pull_request:
    paths:
      - "volumecontrol/**"
      - "volumecontrol-core/**"
      - "volumecontrol-linux/**"
      - "volumecontrol-windows/**"
      - "volumecontrol-macos/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/quality.yml"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  # ── Formatting ──────────────────────────────────────────────────────────────
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable with rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  # ── Security audit ──────────────────────────────────────────────────────────
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-audit
          key: ${{ runner.os }}-cargo-audit-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-audit-

      - name: Install cargo-audit
        run: command -v cargo-audit || cargo install cargo-audit --locked

      - name: cargo audit
        run: cargo audit
