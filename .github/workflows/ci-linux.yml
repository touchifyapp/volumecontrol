# CI workflow for the volumecontrol-linux (PulseAudio) crate and the
# volumecontrol wrapper crate on Linux.
#
# Build matrix
# ┌───────────────────────────────────┬──────────────┬────────────────────────────────────────┐
# │ target                            │ libc         │ steps                                  │
# ├───────────────────────────────────┼──────────────┼────────────────────────────────────────┤
# │ x86_64-unknown-linux-gnu  (native)│ glibc        │ check + build + test (±pulseaudio)     │
# │ aarch64-unknown-linux-gnu  (cross)│ glibc        │ check + build (±pulseaudio)            │
# │ armv7-unknown-linux-gnueabihf     │ glibc        │ check + build (±pulseaudio)            │
# │ x86_64-unknown-linux-musl  (cross)│ musl         │ check only (±pulseaudio)               │
# │ aarch64-unknown-linux-musl        │ musl         │ check only (±pulseaudio)               │
# │ armv7-unknown-linux-musleabihf    │ musl         │ check only (±pulseaudio)               │
# └───────────────────────────────────┴──────────────┴────────────────────────────────────────┘
#
# Cross-compilation uses `cross` (https://github.com/cross-rs/cross).
# All targets install libpulse-dev via the [workspace.metadata.cross.target.*]
# pre-build hooks in Cargo.toml so that `libpulse-sys`'s build script can
# always find `libpulse.pc` — even for a check-only run.
# musl targets cannot link against glibc-backed libpulse.so, so they stop at
# check.

name: CI – Linux (PulseAudio)

on:
  push:
    paths:
      - "volumecontrol-linux/**"
      - "volumecontrol-core/**"
      - "volumecontrol/**"
      - ".github/workflows/ci-linux.yml"
  pull_request:
    paths:
      - "volumecontrol-linux/**"
      - "volumecontrol-core/**"
      - "volumecontrol/**"
      - ".github/workflows/ci-linux.yml"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Native x86_64: check + build + test, with and without pulseaudio ─────────
  native:
    name: Native (x86_64-unknown-linux-gnu)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          # rustfmt is intentionally omitted here: formatting is checked
          # by the quality.yml workflow which runs on all code changes.
          components: clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-native-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-native-

      # libpulse-dev depends on libasound2-dev on Ubuntu.
      # pulseaudio and pulseaudio-utils are required to run a virtual PulseAudio
      # server in CI so that the real-world integration tests can interact with
      # an actual audio sink.
      - name: Install PulseAudio development libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libpulse-dev libasound2-dev \
            pulseaudio pulseaudio-utils

      # Start a headless PulseAudio daemon backed by a virtual null sink.
      # XDG_RUNTIME_DIR is persisted via $GITHUB_ENV so every subsequent step
      # (including the cargo test steps) can reach the daemon's socket.
      - name: Start PulseAudio with a virtual null sink
        run: |
          mkdir -p /tmp/pa-runtime
          echo "XDG_RUNTIME_DIR=/tmp/pa-runtime" >> "$GITHUB_ENV"
          XDG_RUNTIME_DIR=/tmp/pa-runtime pulseaudio --start --exit-idle-time=-1
          # Allow the daemon a moment to become ready before issuing pactl commands.
          sleep 1
          # Load a virtual null sink and make it the default so that every
          # AudioDevice::default() call in the tests resolves to this sink.
          XDG_RUNTIME_DIR=/tmp/pa-runtime pactl load-module module-null-sink \
            sink_name=VirtualSink \
            sink_properties=device.description=Virtual_Sink
          XDG_RUNTIME_DIR=/tmp/pa-runtime pactl set-default-sink VirtualSink

      # ── volumecontrol-linux ──────────────────────────────────────────────────

      - name: cargo clippy volumecontrol-linux (no features)
        run: >
          cargo clippy
          -p volumecontrol-linux
          --all-targets
          -- -D warnings

      - name: cargo clippy volumecontrol-linux (pulseaudio feature)
        run: >
          cargo clippy
          -p volumecontrol-linux
          --features pulseaudio
          --all-targets
          -- -D warnings

      - name: cargo check volumecontrol-linux (no features)
        run: cargo check -p volumecontrol-linux

      - name: cargo check volumecontrol-linux (pulseaudio feature)
        run: cargo check -p volumecontrol-linux --features pulseaudio

      - name: cargo build volumecontrol-linux (no features)
        run: cargo build -p volumecontrol-linux

      - name: cargo build volumecontrol-linux (pulseaudio feature)
        run: cargo build -p volumecontrol-linux --features pulseaudio

      - name: cargo test volumecontrol-linux (no features)
        run: cargo test -p volumecontrol-linux

      - name: cargo test volumecontrol-linux (pulseaudio feature)
        run: cargo test -p volumecontrol-linux --features pulseaudio -- --test-threads=1

      # ── volumecontrol wrapper ────────────────────────────────────────────────
      # The wrapper has no user-visible features; the platform backend is
      # selected and enabled automatically.

      - name: cargo clippy volumecontrol
        run: >
          cargo clippy
          -p volumecontrol
          --all-targets
          -- -D warnings

      - name: cargo check volumecontrol
        run: cargo check -p volumecontrol

      - name: cargo build volumecontrol
        run: cargo build -p volumecontrol

      - name: cargo test volumecontrol
        run: cargo test -p volumecontrol -- --test-threads=1

  # ── Documentation (Linux / PulseAudio) ────────────────────────────────────────
  doc:
    name: cargo doc (Linux)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      RUSTDOCFLAGS: "-D warnings"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-doc-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-doc-

      - name: Install PulseAudio development libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libpulse-dev libasound2-dev

      - name: cargo doc
        run: >
          cargo doc
          -p volumecontrol-core
          -p volumecontrol-linux
          -p volumecontrol
          --features volumecontrol-linux/pulseaudio
          --no-deps

  # ── Cross-compilation with `cross` ────────────────────────────────────────────
  #
  # GNU targets: libpulse-dev is installed for the target arch via dpkg
  # multi-arch → check + build (with and without pulseaudio feature).
  #
  # musl targets: libpulse-dev is installed for the glibc arch so that
  # `libpulse-sys`'s build script succeeds during check; actual linking is not
  # possible → check only (with and without pulseaudio feature).
  cross:
    name: Cross (${{ matrix.target }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # GNU targets: can link libpulse → check + build
          - target: aarch64-unknown-linux-gnu
            can_build: true
          - target: armv7-unknown-linux-gnueabihf
            can_build: true
          # musl targets: cannot link libpulse → check only
          - target: x86_64-unknown-linux-musl
            can_build: false
          - target: aarch64-unknown-linux-musl
            can_build: false
          - target: armv7-unknown-linux-musleabihf
            can_build: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-cross-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-cross-${{ matrix.target }}-

      - name: Install cross
        run: cargo install cross --locked

      # ── volumecontrol-linux ──────────────────────────────────────────────────

      # check always runs regardless of target type
      - name: cross check volumecontrol-linux (no features)
        run: >
          cross check
          -p volumecontrol-linux
          --target ${{ matrix.target }}

      - name: cross check volumecontrol-linux (pulseaudio feature)
        run: >
          cross check
          -p volumecontrol-linux
          --target ${{ matrix.target }}
          --features pulseaudio

      # ── GNU targets only: build with and without the pulseaudio feature ──
      - name: cross build volumecontrol-linux (no features)
        if: matrix.can_build
        run: >
          cross build
          -p volumecontrol-linux
          --target ${{ matrix.target }}

      - name: cross build volumecontrol-linux (pulseaudio feature)
        if: matrix.can_build
        run: >
          cross build
          -p volumecontrol-linux
          --target ${{ matrix.target }}
          --features pulseaudio

      # ── volumecontrol wrapper ────────────────────────────────────────────────
      # The wrapper has no user-visible features; the platform backend is
      # selected and enabled automatically.

      - name: cross check volumecontrol
        run: >
          cross check
          -p volumecontrol
          --target ${{ matrix.target }}

      - name: cross build volumecontrol
        if: matrix.can_build
        run: >
          cross build
          -p volumecontrol
          --target ${{ matrix.target }}
