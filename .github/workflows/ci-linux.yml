# CI workflow for the volumecontrol-linux (PulseAudio) crate.
#
# Build matrix
# ┌───────────────────────────────────┬──────────────┬───────────────┐
# │ target                            │ libc         │ pulseaudio    │
# ├───────────────────────────────────┼──────────────┼───────────────┤
# │ x86_64-unknown-linux-gnu  (native)│ glibc        │ build + test  │
# │ x86_64-unknown-linux-musl         │ musl         │ check only    │
# │ aarch64-unknown-linux-gnu         │ glibc        │ check only    │
# │ aarch64-unknown-linux-musl        │ musl         │ check only    │
# │ armv7-unknown-linux-gnueabihf     │ glibc        │ check only    │
# │ armv7-unknown-linux-musleabihf    │ musl         │ check only    │
# └───────────────────────────────────┴──────────────┴───────────────┘
#
# NOTE: The `pulseaudio` feature requires `libpulse-dev` (and its transitive
# dependency `libasound2-dev`) to be installed on the build host.  For the
# native x86_64-gnu runner these packages are installed before building.
# Cross-compilation targets use `cargo check` without the feature so that no
# native PulseAudio libraries are needed.

name: CI – Linux (PulseAudio)

on:
  push:
    paths:
      - "volumecontrol-linux/**"
      - "volumecontrol-core/**"
      - ".github/workflows/ci-linux.yml"
  pull_request:
    paths:
      - "volumecontrol-linux/**"
      - "volumecontrol-core/**"
      - ".github/workflows/ci-linux.yml"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Native x86_64 build + test (with the `pulseaudio` feature) ─────────────
  native:
    name: Build & Test (x86_64-unknown-linux-gnu, pulseaudio feature)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-native-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-native-

      # libpulse-dev depends on libasound2-dev on Ubuntu.
      - name: Install PulseAudio development libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libpulse-dev libasound2-dev

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (pulseaudio feature)
        run: >
          cargo clippy
          -p volumecontrol-linux
          --features pulseaudio
          --all-targets
          -- -D warnings

      - name: cargo build (pulseaudio feature)
        run: cargo build -p volumecontrol-linux --features pulseaudio

      - name: cargo test (pulseaudio feature)
        run: cargo test -p volumecontrol-linux --features pulseaudio

      - name: cargo test (no features – stub path)
        run: cargo test -p volumecontrol-linux

  # ── Cross-compilation check (stub path, no PulseAudio libraries needed) ─────
  cross-check:
    name: Check (${{ matrix.target }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-gnu
          - aarch64-unknown-linux-musl
          - armv7-unknown-linux-gnueabihf
          - armv7-unknown-linux-musleabihf

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable) + target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-cross-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-cross-${{ matrix.target }}-

      # cargo check does not link, so no cross-compiled libpulse is needed.
      # We check both the stub path (no feature) and the workspace as a whole.
      - name: cargo check – volumecontrol-linux (no features)
        run: >
          cargo check
          -p volumecontrol-linux
          --target ${{ matrix.target }}

      - name: cargo check – whole workspace (no features)
        run: >
          cargo check
          --workspace
          --target ${{ matrix.target }}
